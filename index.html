<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Trainer - Progress Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        #app { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 100%; max-width: 550px; text-align: center; border-top: 8px solid #3498db; position: relative; }
        .grid-select { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        .dot { display: inline-block; width: 12px; height: 12px; background: #3498db; border-radius: 50%; margin: 2px; }
        .row-group { border: 1.5px solid #d1d8e0; margin: 6px; padding: 8px; display: inline-block; border-radius: 8px; background: #fff; }
        .hidden { display: none; }
        button { padding: 12px 24px; cursor: pointer; border-radius: 8px; border: none; background: #2ecc71; color: white; font-weight: bold; font-size: 1rem; margin: 5px; }
        .reset-btn { background: #95a5a6; padding: 5px 10px; font-size: 0.8rem; position: absolute; top: 10px; right: 10px; }
        .clue-btn { background: #f39c12; }
        .mode-btn { background: #3498db; width: 200px; }
        input[type="number"] { font-size: 2.5rem; width: 150px; text-align: center; margin: 15px; border: 3px solid #ddd; border-radius: 10px; }
        input.error { border-color: #e74c3c; background-color: #fdf2f2; }
        #timer-container { width: 100%; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; margin-bottom: 5px; }
        #timer-bar { height: 100%; background: #e74c3c; width: 100%; }
        #progress-text { font-size: 0.9rem; color: #7f8c8d; font-weight: bold; margin-bottom: 15px; }
        #status-msg { font-weight: bold; min-height: 24px; margin-bottom: 10px; }
        .wrong-text { color: #e74c3c; }
    </style>
</head>
<body>

<div id="app">
    <button id="mini-reset" class="reset-btn hidden" onclick="location.reload()">Start Over</button>

    <div id="setup-screen">
        <h1>Math Trainer</h1>
        <p>Select the tables you want to practice:</p>
        <div class="grid-select" id="table-options"></div>
        <p>Time per question:</p>
        <select id="time-select" style="padding: 10px; width: 100%;">
            <option value="5">5 Seconds (Fast)</option>
            <option value="10" selected>10 Seconds (Standard)</option>
            <option value="15">15 Seconds (Practice)</option>
        </select>
        <br><br>
        <button class="mode-btn" onclick="start(true)">Multiplication (×)</button>
        <button class="mode-btn" onclick="start(false)">Division (÷)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress-text">Question 1 of 20</div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div id="status-msg"></div>
        
        <h2 id="question-display" style="font-size: 3.5rem; margin: 10px 0;"></h2>
        
        <input type="number" id="user-answer" placeholder="?" autocomplete="off">
        <br>
        <button onclick="checkAnswer()">Submit</button>
        <button class="clue-btn" onclick="showClue()">💡 Clue</button>
        
        <div id="visual-clue" class="hidden" style="margin-top:20px;"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Quiz Complete!</h2>
        <p id="final-score" style="font-size: 2rem;"></p>
        <p id="final-detail"></p>
        <button onclick="location.reload()" style="background: #3498db;">Restart Trainer</button>
    </div>
</div>

<script>
    let isMultiplication = true, selectedTables = [], currentQ = {}, timerInterval, timeLeft, score = 0, count = 0, timerPaused = false, attempts = 0;
    const totalQuestions = 20;
    const pool = [2, 3, 4, 5, 6, 7, 8, 9, 12];

    const container = document.getElementById('table-options');
    [2,3,4,5,6,7,8,9,11,12].forEach(num => {
        container.innerHTML += `<label><input type="checkbox" class="tbl-check" value="${num}"> ${num}s</label>`;
    });

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !document.getElementById('quiz-screen').classList.contains('hidden')) checkAnswer();
    });

    function start(mode) {
        isMultiplication = mode;
        const checks = document.querySelectorAll('.tbl-check:checked');
        selectedTables = Array.from(checks).map(c => parseInt(c.value));
        if(selectedTables.length === 0) return alert("Select at least one table!");
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('mini-reset').classList.remove('hidden');
        generateQuestion();
    }

    function generateQuestion() {
        attempts = 0;
        timerPaused = false;
        document.getElementById('progress-text').innerText = `Question ${count + 1} of ${totalQuestions}`;
        document.getElementById('status-msg').innerHTML = "";
        document.getElementById('user-answer').classList.remove('error');
        document.getElementById('visual-clue').classList.add('hidden');
        document.getElementById('visual-clue').innerHTML = '';
        
        const n1 = selectedTables[Math.floor(Math.random() * selectedTables.length)];
        const n2 = pool[Math.floor(Math.random() * pool.length)];
        
        if(isMultiplication) {
            currentQ = { a: n1, b: n2, ans: n1 * n2, text: `${n1} × ${n2}` };
        } else {
            currentQ = { a: n1 * n2, b: n1, ans: n2, text: `${n1 * n2} ÷ ${n1}` };
        }

        document.getElementById('question-display').innerText = currentQ.text;
        document.getElementById('user-answer').value = '';
        document.getElementById('user-answer').focus();
        resetTimer();
    }

    function showClue() {
        timerPaused = true; 
        document.getElementById('status-msg').innerHTML = "⏸ Timer Paused";
        const visual = document.getElementById('visual-clue');
        visual.classList.remove('hidden');
        visual.innerHTML = '';
        
        let groups = isMultiplication ? currentQ.a : currentQ.b;
        let perGroup = isMultiplication ? currentQ.b : currentQ.ans;

        for(let i=0; i<groups; i++) {
            let group = document.createElement('div');
            group.className = 'row-group';
            for(let j=0; j<perGroup; j++) group.innerHTML += '<div class="dot"></div>';
            visual.appendChild(group);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        const maxTime = parseInt(document.getElementById('time-select').value);
        timeLeft = maxTime;
        const bar = document.getElementById('timer-bar');
        timerInterval = setInterval(() => {
            if(!timerPaused) {
                timeLeft -= 0.1;
                bar.style.width = (timeLeft / maxTime * 100) + "%";
                if(timeLeft <= 0) {
                    timerPaused = true;
                    document.getElementById('status-msg').innerHTML = "<span class='wrong-text'>⏰ Time's up! Solve it to move on.</span>";
                    showClue();
                }
            }
        }, 100);
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('user-answer').value);
        
        if(userAns === currentQ.ans) {
            if(attempts === 0 && !timerPaused) score++;
            
            count++;
            if(count >= totalQuestions) {
                endQuiz();
            } else {
                generateQuestion();
            }
        } else {
            attempts++;
            timerPaused = true;
            document.getElementById('user-answer').classList.add('error');
            document.getElementById('status-msg').innerHTML = "<span class='wrong-text'>❌ Try again!</span>";
            if(attempts >= 2) showClue();
            
            // Shake effect
            document.getElementById('user-answer').style.transform = "translateX(10px)";
            setTimeout(() => document.getElementById('user-answer').style.transform = "translateX(0)", 100);
        }
    }

    function endQuiz() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('mini-reset').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${totalQuestions}`;
        document.getElementById('final-detail').innerText = `You answered ${score} questions correctly on your first try!`;
    }
</script>
</body>
</html>
